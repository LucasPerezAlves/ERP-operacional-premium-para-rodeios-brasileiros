spring:
  application:
    name: rodeio-backend

  datasource:
    # Connection string do Supabase: Dashboard > Project Settings > Database
    # Ex.: jdbc:postgresql://db.SEU-PROJETO.supabase.co:5432/postgres
    url: ${SUPABASE_DB_URL}
    username: ${SUPABASE_DB_USER:postgres}
    password: ${SUPABASE_DB_PASSWORD}

  jpa:
    hibernate:
      # Nunca deixar o Hibernate alterar schema em produção;
      # o schema é versionado à parte (migrations virão no módulo 2).
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        default_schema: public

  mail:
    # SMTP para o e-mail de aprovação da gerência.
    # Com Gmail: usar uma "Senha de app" (não a senha da conta).
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME}
    password: ${SMTP_PASSWORD}
    properties:
      "[mail.smtp.auth]": true
      "[mail.smtp.starttls.enable]": true

supabase:
  # Dashboard > Project Settings > API > JWT Secret
  jwt-secret: ${SUPABASE_JWT_SECRET}

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}
  gerencia:
    # Destinatário único dos pedidos de aprovação de cadastro
    email: ${APP_GERENCIA_EMAIL:perezcfnpbnu@gmail.com}
  seguranca:
    # Assina os links "Aprovar Peão" (HMAC). Gere um valor longo e aleatório.
    aprovacao-secret: ${APP_APROVACAO_SECRET}
    # Valida o header X-Webhook-Secret enviado pelo Supabase
    webhook-secret: ${APP_WEBHOOK_SECRET}
  # URL pública do back-end usada para montar o link do e-mail
  # (em dev com webhook real, use a URL do túnel: ngrok, cloudflared etc.)
  public-base-url: ${APP_PUBLIC_BASE_URL:http://localhost:8080}

server:
  port: 8080
