spring:
  application:
    name: rodeio-backend

  datasource:
    # Connection string do Supabase: Dashboard > Project Settings > Database
    # Ex.: jdbc:postgresql://db.SEU-PROJETO.supabase.co:5432/postgres
    url: ${SUPABASE_DB_URL}
    username: ${SUPABASE_DB_USER:postgres}
    password: ${SUPABASE_DB_PASSWORD}

  jpa:
    hibernate:
      # Nunca deixar o Hibernate alterar schema em produção;
      # o schema é versionado à parte (migrations virão no módulo 2).
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        default_schema: public

supabase:
  # Dashboard > Project Settings > API > JWT Secret
  jwt-secret: ${SUPABASE_JWT_SECRET}

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}

server:
  port: 8080
